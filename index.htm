<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>Arnold's Factorio Tools</title>
    <style>
        /* @INCLUDE "common/layout.css" */

<body>
    <div class="container">
        <header class="app-header">
            <h1 class="app-title">Arnold's Factorio Tools</h1>
            <div class="tabs">
                <button class="tab-link active" data-tab="blueprint-upgrader">
                    <span class="tab-icon" data-image="construction-robot:28"></span>
                    <span class="tab-text"><span class="tab-title">Blueprint Upgrader</span><span class="tab-desc">Upgrade/downgrade + search/replace</span></span>
                </button>
                <button class="tab-link" data-tab="module-table">
                    <span class="tab-icon" data-image="productivity-module:28"></span>
                    <span class="tab-text"><span class="tab-title">Module Table</span><span class="tab-desc">Compare module stats</span></span>
                </button>
                <button class="tab-link" data-tab="automall">
                    <span class="tab-icon" data-image="buffer-chest:28"></span>
                    <span class="tab-text"><span class="tab-title">Automall</span><span class="tab-desc">Automall combinator helper</span></span>
                </button>
                <button class="tab-link" data-tab="platform-image">
                    <span class="tab-icon" data-image="space-platform-foundation:28"></span>
                    <span class="tab-text"><span class="tab-title">Platform Image</span><span class="tab-desc">Image → space platform</span></span>
                </button>
                <button class="tab-link" data-tab="links">
                    <span class="tab-icon" data-image="rocket-silo:28"></span>
                    <span class="tab-text"><span class="tab-title">Links</span><span class="tab-desc">Handy Factorio resources</span></span>
                </button>
            </div>
        </header>

        <main class="app-content">
            <div class="tab-panels">
                <div class="tab-panel active" data-tab="blueprint-upgrader">
                    <!-- @INCLUDE "contents/blueprint-upgrader/blueprint-editor.html" -->
                </div>
                <div class="tab-panel" data-tab="platform-image">
                    <!-- @INCLUDE "contents/platform-image/platform-image.html" -->
                </div>
                <div class="tab-panel" data-tab="module-table">
                    <!-- @INCLUDE "contents/module-table/module-overview.html" -->
                </div>
                <div class="tab-panel" data-tab="automall">
                    <!-- @INCLUDE "contents/automall/automall.html" -->
                </div>
                <div class="tab-panel" data-tab="links">
                    <ul>
                        <li>
                            <a href="https://rocketcal.cc/" target="_blank" rel="noreferrer">rocketcal.cc – Factorio spaceship rocket calculator</a>
                            <div>Paste a space platform blueprint to plan zero-waste rocket launches.</div>
                        </li>
                        <li>
                            <a href="https://factoriocheatsheet.com" target="_blank" rel="noreferrer">Factorio Cheat Sheet</a>
                            <div>Compact reference for build ratios, tips, and common game facts.</div>
                        </li>
                    </ul>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <a class="footer-link" href="https://github.com/ArnoldSmith86/factorio-tools" target="_blank" rel="noreferrer">
                <img class="footer-icon" src="https://github.githubassets.com/favicons/favicon.png" alt=""> GitHub
            </a>
            <span class="footer-sep">·</span>
            <span class="footer-note">Public domain (CC0)</span>
        </footer>
    </div>
